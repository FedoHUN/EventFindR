<div class="container py-4">
  <a routerLink="/events" class="btn btn-outline-secondary mb-3">
    <i class="bi bi-arrow-left me-1"></i>Back to Events
  </a>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h1 class="fw-bold mb-4"><i class="bi bi-calendar-plus me-2"></i>Create Event</h1>

          @if (errorMessage()) {
            <div class="alert alert-danger" role="alert">
              <i class="bi bi-exclamation-triangle me-1"></i>{{ errorMessage() }}
            </div>
          }

          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="name" class="form-label fw-semibold">Event Name <span class="text-danger">*</span></label>
              <input
                id="name"
                type="text"
                class="form-control"
                [class.is-invalid]="isInvalid('name')"
                formControlName="name"
                placeholder="e.g. Summer Music Festival">
              @if (isInvalid('name')) {
                <div class="invalid-feedback">Event name is required.</div>
              }
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="location" class="form-label fw-semibold">Location <span class="text-danger">*</span></label>
                <input
                  id="location"
                  type="text"
                  class="form-control"
                  [class.is-invalid]="isInvalid('location')"
                  formControlName="location"
                  placeholder="e.g. Bratislava, Slovakia">
                @if (isInvalid('location')) {
                  <div class="invalid-feedback">Location is required.</div>
                }
              </div>
              <div class="col-md-6">
                <label for="eventDate" class="form-label fw-semibold">Date & Time <span class="text-danger">*</span></label>
                <input
                  id="eventDate"
                  type="datetime-local"
                  class="form-control"
                  [class.is-invalid]="isInvalid('eventDate')"
                  formControlName="eventDate">
                @if (isInvalid('eventDate')) {
                  <div class="invalid-feedback">Date is required.</div>
                }
              </div>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label fw-semibold">Description</label>
              <textarea
                id="description"
                class="form-control"
                formControlName="description"
                rows="4"
                placeholder="Describe your event..."></textarea>
            </div>

            <div class="mb-3">
              <label for="performers" class="form-label fw-semibold">Performers</label>
              <input
                id="performers"
                type="text"
                class="form-control"
                formControlName="performers"
                placeholder="e.g. DJ Shadow, The Roots">
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label for="price" class="form-label fw-semibold">Price (EUR)</label>
                <input
                  id="price"
                  type="number"
                  class="form-control"
                  [class.is-invalid]="isInvalid('price')"
                  formControlName="price"
                  min="0"
                  step="0.01"
                  placeholder="0.00 = Free">
                @if (isInvalid('price')) {
                  <div class="invalid-feedback">Price must be 0 or more.</div>
                }
              </div>
              <div class="col-md-8">
                <label for="ticketUrl" class="form-label fw-semibold">Ticket URL</label>
                <input
                  id="ticketUrl"
                  type="url"
                  class="form-control"
                  formControlName="ticketUrl"
                  placeholder="https://tickets.example.com/...">
              </div>
            </div>

            <div class="mb-4">
              <label for="imageUrl" class="form-label fw-semibold">Image URL</label>
              <input
                id="imageUrl"
                type="url"
                class="form-control"
                formControlName="imageUrl"
                placeholder="https://example.com/image.jpg">
            </div>

            <div class="d-flex gap-2">
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="submitting()">
                @if (submitting()) {
                  <span class="spinner-border spinner-border-sm me-1" role="status"></span>
                }
                <i class="bi bi-plus-circle me-1"></i>Create Event
              </button>
              <a routerLink="/events" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
