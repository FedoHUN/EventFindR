apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventfindr-fe
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eventfindr-fe
  template:
    metadata:
      labels:
        app: eventfindr-fe
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: eventfindr-fe
          # Pred produkcnym deployom nastav vlastny ACR registry a idealne immutable image tag.
          image: acrfsavojtkom.azurecr.io/fsa-eventfindr-frontend:latest
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 250m
              memory: 250Mi
            requests:
              cpu: 150m
              memory: 150Mi
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 3

        # Exporter spristupni Nginx metriky bez miesania monitoringu do aplikacie.
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.3
          args:
            - --nginx.scrape-uri=http://localhost:8080/stub_status
          ports:
            - name: metrics
              containerPort: 9113
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 10m
              memory: 16Mi
