spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventfindr}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    name: eventfindr-db
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    mapping-resources:
      - persistence/eventfindr-orm.xml
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 85MB
  liquibase:
    change-log: classpath:persistence/db/changelog/changelog-master.xml
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/EventfindR}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/realms/EventfindR/protocol/openid-connect/certs}

eventfindr:
  media:
    storage-path: ./media-storage
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  endpoints:
    web:
      exposure:
        include: health,info
