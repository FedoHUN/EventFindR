stages:
  - build_backend
  - build_frontend
  - deploy

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

variables:
  BACKEND_IMAGE_NAME: "fsa-eventfindr-backend"
  FRONTEND_IMAGE_NAME: "fsa-eventfindr-frontend"
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

.docker-build:
  image: docker:27.5
  services:
    - name: docker:27.5-dind
      alias: docker
  before_script:
    - until docker info >/dev/null 2>&1; do echo "Waiting for Docker daemon..."; sleep 2; done
    - test -n "$ACR_REGISTRY" || (echo "Missing CI variable ACR_REGISTRY" && exit 1)
    - test -n "$DOCKER_USERNAME" || (echo "Missing CI variable DOCKER_USERNAME" && exit 1)
    - test -n "$DOCKER_PASSWORD" || (echo "Missing CI variable DOCKER_PASSWORD" && exit 1)
    - echo "$DOCKER_PASSWORD" | docker login "$ACR_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
    - export IMAGE_VERSION="${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"

build_backend:
  extends: .docker-build
  stage: build_backend
  script:
    - docker build -t "$ACR_REGISTRY/$BACKEND_IMAGE_NAME:$IMAGE_VERSION" -t "$ACR_REGISTRY/$BACKEND_IMAGE_NAME:latest" fsa-eventfindr-backend
    - docker push "$ACR_REGISTRY/$BACKEND_IMAGE_NAME:$IMAGE_VERSION"
    - docker push "$ACR_REGISTRY/$BACKEND_IMAGE_NAME:latest"

build_frontend:
  extends: .docker-build
  stage: build_frontend
  script:
    - docker build -t "$ACR_REGISTRY/$FRONTEND_IMAGE_NAME:$IMAGE_VERSION" -t "$ACR_REGISTRY/$FRONTEND_IMAGE_NAME:latest" fsa-eventfindr-frontend
    - docker push "$ACR_REGISTRY/$FRONTEND_IMAGE_NAME:$IMAGE_VERSION"
    - docker push "$ACR_REGISTRY/$FRONTEND_IMAGE_NAME:latest"

deploy_aks:
  stage: deploy
  image: alpine:3.20
  needs:
    - build_backend
    - build_frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
  before_script:
    - apk add --no-cache ca-certificates curl
    - curl -fsSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.34.3/bin/linux/amd64/kubectl"
    - curl -fsSLo /tmp/kubectl.sha256 "https://dl.k8s.io/release/v1.34.3/bin/linux/amd64/kubectl.sha256"
    - echo "$(cat /tmp/kubectl.sha256)  /usr/local/bin/kubectl" | sha256sum -c -
    - chmod +x /usr/local/bin/kubectl
    - kubectl version --client=true
    - test -n "$KUBECONFIG_BASE64" || (echo "Missing CI variable KUBECONFIG_BASE64" && exit 1)
    - |
      mkdir -p ~/.kube
      if printf '%s' "$KUBECONFIG_BASE64" | base64 -d > ~/.kube/config.decoded 2>/dev/null && grep -q "apiVersion:" ~/.kube/config.decoded; then
        mv ~/.kube/config.decoded ~/.kube/config
      else
        printf '%s' "$KUBECONFIG_BASE64" > ~/.kube/config
        rm -f ~/.kube/config.decoded
      fi
      sed -i 's/\r$//' ~/.kube/config
      grep -q "apiVersion:" ~/.kube/config || (echo "KUBECONFIG_BASE64 did not produce a valid kubeconfig. Store either raw kubeconfig YAML or base64-encoded kubeconfig YAML." && exit 1)
      kubectl config current-context
    - export IMAGE_VERSION="${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"
  script:
    - kubectl apply -f kubernetes/workload/01-namespace.yaml
    - kubectl apply -f kubernetes/workload/03-app-backend/
    - kubectl apply -f kubernetes/workload/04-app-frontend/
    - kubectl apply -f kubernetes/workload/05-ingress/app-ingress-nip.yaml
    - kubectl set image deployment/eventfindr-be eventfindr-be="$ACR_REGISTRY/$BACKEND_IMAGE_NAME:$IMAGE_VERSION" -n app
    - kubectl set image deployment/eventfindr-fe eventfindr-fe="$ACR_REGISTRY/$FRONTEND_IMAGE_NAME:$IMAGE_VERSION" -n app
    - kubectl rollout status deployment/eventfindr-be -n app --timeout=5m
    - kubectl rollout status deployment/eventfindr-fe -n app --timeout=5m
